<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SIRA</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f0f2f5;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px}
    .card{background:#fff;border-radius:16px;padding:32px;max-width:440px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,.1)}
    h2{color:#0D2B55;margin:0 0 20px}
    .box{background:#f5f7fa;border-radius:8px;padding:10px 14px;font-family:monospace;font-size:14px;margin:4px 0 18px;word-break:break-all}
    button{width:100%;padding:14px;font-size:16px;font-weight:700;background:#0A6655;color:#fff;border:none;border-radius:10px;cursor:pointer}
    button:disabled{background:#aaa}
    .out{margin-top:16px;padding:12px;border-radius:8px;font-family:monospace;font-size:13px;min-height:48px;white-space:pre-wrap;word-break:break-all;border-left:4px solid #ccc;background:#f5f7fa}
    .ok{border-left-color:#0A6655;color:#0A6655;background:#edfaf6}
    .er{border-left-color:#c0392b;color:#c0392b;background:#fdf0ee}
    .in{border-left-color:#1a6eb5;color:#1a6eb5;background:#eef4fd}
    small{display:block;margin-top:16px;color:#aaa;text-align:center;font-size:11px}
  </style>
</head>
<body>
  <div class="card">
    <h2 id="T">SIRA Secure Verification</h2>
    <div id="L" style="font-size:13px;color:#666;font-weight:600;text-transform:uppercase">Session ID</div>
    <div class="box" id="S">loading...</div>
    <button id="B">Start credential verification</button>
    <div class="out in" id="O">Waiting...</div>
    <small id="F">SIRA stores no personal data. Passkeys only.</small>
  </div>

  <script>
    (function(){
      var p = new URLSearchParams(location.search);
      var sid = p.get("sid") || "";
      var sig = p.get("sig") || "";
      var lang = (p.get("lang") || "en").toLowerCase();
      var BASE = location.origin + "/functions/v1";

      var I18N = {
        en: {
          htmlLang: "en",
          dir: "ltr",
          title: "SIRA Secure Verification",
          sessionId: "Session ID",
          startButton: "Start credential verification",
          waiting: "Waiting...",
          missingUrl: "Missing sid or sig in URL",
          gettingChallenge: "Getting challenge...",
          challengeOk: "Challenge OK. Touch your device...",
          signedVerifying: "Signed. Verifying...",
          accessGranted: "ACCESS GRANTED",
          footer: "SIRA stores no personal data. Passkeys only.",
          missingSession: "(missing session)",
          noChallenge: "No challenge in response",
          noCredential: "No credential returned"
        },
        fr: {
          htmlLang: "fr",
          dir: "ltr",
          title: "Vérification sécurisée SIRA",
          sessionId: "ID de session",
          startButton: "Démarrer la vérification",
          waiting: "En attente...",
          missingUrl: "Paramètres sid ou sig manquants dans l URL",
          gettingChallenge: "Récupération du challenge...",
          challengeOk: "Challenge reçu. Touchez votre appareil...",
          signedVerifying: "Signature effectuée. Vérification en cours...",
          accessGranted: "ACCÈS AUTORISÉ",
          footer: "SIRA ne stocke aucune donnée personnelle. Passkeys uniquement.",
          missingSession: "(session manquante)",
          noChallenge: "Aucun challenge dans la réponse",
          noCredential: "Aucun identifiant retourné"
        },
        ar: {
          htmlLang: "ar",
          dir: "rtl",
          title: "التحقق الآمن من SIRA",
          sessionId: "معرّف الجلسة",
          startButton: "ابدأ التحقق",
          waiting: "في الانتظار...",
          missingUrl: "المعامل sid أو sig مفقود في الرابط",
          gettingChallenge: "جارٍ الحصول على التحدي...",
          challengeOk: "تم استلام التحدي. المس جهازك...",
          signedVerifying: "تم التوقيع. جارٍ التحقق...",
          accessGranted: "تم السماح بالدخول",
          footer: "SIRA لا يخزن أي بيانات شخصية. مفاتيح مرور فقط.",
          missingSession: "(جلسة مفقودة)",
          noChallenge: "لا يوجد تحدٍ في الاستجابة",
          noCredential: "لم يتم إرجاع أي بيانات اعتماد"
        }
      };

      var t = I18N[lang] || I18N.en;

      document.documentElement.lang = t.htmlLang;
      document.documentElement.dir = t.dir;

      var T = document.getElementById("T");
      var L = document.getElementById("L");
      var S = document.getElementById("S");
      var O = document.getElementById("O");
      var B = document.getElementById("B");
      var F = document.getElementById("F");

      T.textContent = t.title;
      L.textContent = t.sessionId;
      B.textContent = t.startButton;
      O.textContent = t.waiting;
      F.textContent = t.footer;
      S.textContent = sid || t.missingSession;

      if (!sid || !sig) {
        O.textContent = t.missingUrl;
        O.className = "out er";
        B.disabled = true;
      }

      function setOut(m, type) {
        O.textContent = typeof m === "string" ? m : JSON.stringify(m, null, 2);
        O.className = "out " + (type || "in");
      }

      function dec(s) {
        var b = s.replace(/-/g, "+").replace(/_/g, "/");
        var pad = "=".repeat((4 - b.length % 4) % 4);
        var bin = atob(b + pad);
        return Uint8Array.from(bin, function(c){ return c.charCodeAt(0); });
      }

      B.addEventListener("click", async function(){
        B.disabled = true;
        setOut(t.gettingChallenge, "in");

        try {
          var r1 = await fetch(
            BASE + "/create-challenge?sid=" + encodeURIComponent(sid) + "&sig=" + encodeURIComponent(sig),
            {
              method: "GET",
              headers: { "accept": "application/json" },
              cache: "no-store"
            }
          );

          var j1 = await r1.json();
          if (!r1.ok) throw new Error("create-challenge: " + JSON.stringify(j1));
          if (!j1.challenge) throw new Error(t.noChallenge);

          setOut(t.challengeOk, "in");

          var pk = {
            challenge: dec(j1.challenge),
            rpId: j1.rpId,
            timeout: j1.timeoutMs || 90000,
            userVerification: j1.userVerification || "required",
            allowCredentials: []
          };

          var c = await navigator.credentials.get({ publicKey: pk });
          if (!c) throw new Error(t.noCredential);

          setOut(t.signedVerifying, "in");

          var a = {
            id: c.id,
            type: c.type,
            rawId: Array.from(new Uint8Array(c.rawId)),
            response: {
              clientDataJSON: Array.from(new Uint8Array(c.response.clientDataJSON)),
              authenticatorData: Array.from(new Uint8Array(c.response.authenticatorData)),
              signature: Array.from(new Uint8Array(c.response.signature))
            }
          };

          var r2 = await fetch(BASE + "/verify-assertion", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ sid: sid, sig: sig, assertion: a }),
            cache: "no-store"
          });

          var j2 = await r2.json();
          if (!r2.ok) throw new Error("verify-assertion: " + JSON.stringify(j2));

          setOut(t.accessGranted + "\n" + JSON.stringify(j2, null, 2), "ok");
        } catch (e) {
          setOut("ERROR: " + (e.message || String(e)), "er");
        } finally {
          B.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
