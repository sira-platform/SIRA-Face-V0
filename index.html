Deno.serve((req: Request) => {
  const html = `<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SIRA Handshake</title>
<style>
body { font-family: system-ui; margin:40px }
button { padding:12px 20px; font-size:18px; cursor:pointer }
pre { background:#eee; padding:10px; white-space:pre-wrap }
</style>
</head>
<body>
<h2>SIRA Secure Handshake</h2>
<p>Session ID:</p>
<pre id="sid">loading</pre>
<p><button id="go" type="button">Start passkey handshake</button></p>
<pre id="out"></pre>
<script>
const params = new URLSearchParams(window.location.search)
document.getElementById("sid").textContent = params.get("sid") || "(missing sid)"

async function startPasskey(){
  const sid = params.get("sid")
  const sig = params.get("sig")
  const base = window.location.origin

  const r = await fetch(base + "/functions/v1/create-challenge?sid=" + encodeURIComponent(sid) + "&sig=" + encodeURIComponent(sig))
  const j = await r.json()

  const challenge = Uint8Array.from(
    atob(j.challenge.replace(/-/g,"+").replace(/_/g,"/")),
    c => c.charCodeAt(0)
  )

  const publicKey = {
    challenge,
    timeout: j.timeoutMs,
    rpId: j.rpId,
    userVerification: j.userVerification
  }

  const cred = await navigator.credentials.get({ publicKey })

  const assertion = {
    id: cred.id,
    type: cred.type,
    rawId: Array.from(new Uint8Array(cred.rawId)),
    response:{
      clientDataJSON: Array.from(new Uint8Array(cred.response.clientDataJSON)),
      authenticatorData: Array.from(new Uint8Array(cred.response.authenticatorData)),
      signature: Array.from(new Uint8Array(cred.response.signature))
    }
  }

  const verify = await fetch(base + "/functions/v1/verify-assertion",{
    method:"POST",
    headers:{ "content-type":"application/json"},
    body: JSON.stringify({ sid, sig, assertion })
  })

  const result = await verify.json()
  document.getElementById("out").textContent = JSON.stringify(result,null,2)
}

document.getElementById("go").addEventListener("click", () => startPasskey())
</script>
</body>
</html>`

  return new Response(html, {
    headers: {
      "Content-Type": "text/html; charset=utf-8",
      "Cache-Control": "no-store",
    }
  })
})
