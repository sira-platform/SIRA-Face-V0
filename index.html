Deno.serve((_req: Request) => {
  const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SIRA</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f0f2f5;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
margin:0;
padding:20px
}
.card{
background:#fff;
border-radius:16px;
padding:32px;
max-width:440px;
width:100%;
box-shadow:0 4px 20px rgba(0,0,0,.1)
}
h2{
color:#0D2B55;
margin:0 0 20px
}
.box{
background:#f5f7fa;
border-radius:8px;
padding:10px 14px;
font-family:monospace;
font-size:14px;
margin:4px 0 18px;
word-break:break-all
}
button{
width:100%;
padding:14px;
font-size:16px;
font-weight:700;
background:#0A6655;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer
}
button:disabled{
background:#aaa
}
.out{
margin-top:16px;
padding:12px;
border-radius:8px;
font-family:monospace;
font-size:13px;
min-height:48px;
white-space:pre-wrap;
word-break:break-all;
border-left:4px solid #ccc;
background:#f5f7fa
}
.ok{
border-left-color:#0A6655;
color:#0A6655;
background:#edfaf6
}
.er{
border-left-color:#c0392b;
color:#c0392b;
background:#fdf0ee
}
.in{
border-left-color:#1a6eb5;
color:#1a6eb5;
background:#eef4fd
}
small{
display:block;
margin-top:16px;
color:#aaa;
text-align:center;
font-size:11px
}
</style>
</head>
<body>
<div class="card">
<h2 id="T">SIRA Secure Verification</h2>
<div id="L" style="font-size:13px;color:#666;font-weight:600;text-transform:uppercase">Session ID</div>
<div class="box" id="S">loading...</div>
<button id="B">Start credential verification</button>
<div class="out in" id="O">Waiting...</div>
<small id="F">SIRA stores no personal data. Passkeys only.</small>
</div>

<script>
(function(){
var p=new URLSearchParams(location.search);
var sid=p.get("sid")||"";
var sig=p.get("sig")||"";
var lang=(p.get("lang")||"en").toLowerCase();
var BASE=location.origin+"/functions/v1";

var I18N={
en:{
title:"SIRA Secure Verification",
session:"Session ID",
start:"Start credential verification",
waiting:"Waiting...",
footer:"SIRA stores no personal data. Passkeys only.",
missingUrl:"Missing sid or sig in URL",
missingSession:"(missing session)",
gettingChallenge:"Getting challenge...",
noChallenge:"No challenge in response",
challengeOk:"Challenge OK. Touch your device...",
noCredential:"No credential returned",
signedVerifying:"Signed. Verifying...",
accessGranted:"ACCESS GRANTED"
},
fr:{
title:"Verification securisee SIRA",
session:"ID de session",
start:"Demarrer la verification",
waiting:"En attente...",
footer:"SIRA ne stocke aucune donnee personnelle. Passkeys uniquement.",
missingUrl:"Parametres sid ou sig manquants dans l URL",
missingSession:"(session manquante)",
gettingChallenge:"Recuperation du challenge...",
noChallenge:"Aucun challenge dans la reponse",
challengeOk:"Challenge recu. Touchez votre appareil...",
noCredential:"Aucun identifiant retourne",
signedVerifying:"Signature effectuee. Verification en cours...",
accessGranted:"ACCES AUTORISE"
},
ar:{
title:"SIRA Secure Verification",
session:"Session ID",
start:"Start credential verification",
waiting:"Waiting...",
footer:"SIRA stores no personal data. Passkeys only.",
missingUrl:"Missing sid or sig in URL",
missingSession:"(missing session)",
gettingChallenge:"Getting challenge...",
noChallenge:"No challenge in response",
challengeOk:"Challenge OK. Touch your device...",
noCredential:"No credential returned",
signedVerifying:"Signed. Verifying...",
accessGranted:"ACCESS GRANTED"
}
};

var t=I18N[lang]||I18N.en;

document.documentElement.lang=(lang==="fr"?"fr":"en");
document.documentElement.dir="ltr";

document.getElementById("T").textContent=t.title;
document.getElementById("L").textContent=t.session;
document.getElementById("B").textContent=t.start;
document.getElementById("O").textContent=t.waiting;
document.getElementById("F").textContent=t.footer;

var S=document.getElementById("S");
var O=document.getElementById("O");
var B=document.getElementById("B");

S.textContent=sid||t.missingSession;

if(!sid||!sig){
  O.textContent=t.missingUrl;
  O.className="out er";
  B.disabled=true;
}

function setOut(m,tone){
  O.textContent=typeof m==="string"?m:JSON.stringify(m,null,2);
  O.className="out "+(tone||"in");
}

function dec(s){
  var b=s.replace(/-/g,"+").replace(/_/g,"/");
  var pad="=".repeat((4-b.length%4)%4);
  var bin=atob(b+pad);
  return Uint8Array.from(bin,function(c){return c.charCodeAt(0);});
}

B.addEventListener("click",async function(){
  B.disabled=true;
  setOut(t.gettingChallenge,"in");

  try{
    var r1=await fetch(
      BASE+"/create-challenge?sid="+encodeURIComponent(sid)+"&sig="+encodeURIComponent(sig),
      {method:"GET",headers:{"accept":"application/json"},cache:"no-store"}
    );

    var j1=await r1.json();

    if(!r1.ok) throw new Error("create-challenge: "+JSON.stringify(j1));
    if(!j1.challenge) throw new Error(t.noChallenge);

    setOut(t.challengeOk,"in");

    var pk={
      challenge:dec(j1.challenge),
      rpId:j1.rpId,
      timeout:j1.timeoutMs||90000,
      userVerification:j1.userVerification||"required",
      allowCredentials:[]
    };

    var c=await navigator.credentials.get({publicKey:pk});
    if(!c) throw new Error(t.noCredential);

    setOut(t.signedVerifying,"in");

    var a={
      id:c.id,
      type:c.type,
      rawId:Array.from(new Uint8Array(c.rawId)),
      response:{
        clientDataJSON:Array.from(new Uint8Array(c.response.clientDataJSON)),
        authenticatorData:Array.from(new Uint8Array(c.response.authenticatorData)),
        signature:Array.from(new Uint8Array(c.response.signature))
      }
    };

    var r2=await fetch(BASE+"/verify-assertion",{
      method:"POST",
      headers:{"content-type":"application/json"},
      body:JSON.stringify({sid:sid,sig:sig,assertion:a}),
      cache:"no-store"
    });

    var j2=await r2.json();

    if(!r2.ok) throw new Error("verify-assertion: "+JSON.stringify(j2));

    setOut(t.accessGranted+"\\n"+JSON.stringify(j2,null,2),"ok");
  }catch(e){
    setOut("ERROR: "+(e.message||String(e)),"er");
  }finally{
    B.disabled=false;
  }
});
})();
</script>
</body>
</html>`;

  return new Response(html, {
    headers: { "Content-Type": "text/html; charset=utf-8" },
  });
});
