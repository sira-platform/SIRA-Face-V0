<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SIRA Secure Handshake</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:40px;
}
.card{
  max-width:700px;
  border:1px solid #ddd;
  padding:20px;
  border-radius:10px;
}
button{
  padding:10px 16px;
  font-size:16px;
}
pre{
  background:#f5f5f5;
  padding:10px;
}
</style>
</head>

<body>

<div class="card">

<h1>SIRA Secure Handshake</h1>

<p>Session ID</p>
<pre id="sid">(missing)</pre>

<button id="start">Start passkey handshake</button>

<h3>Output</h3>
<pre id="out">Waiting...</pre>

</div>

<script>

const params = new URLSearchParams(window.location.search)

const sid = params.get("sid")
const sig = params.get("sig")

document.getElementById("sid").textContent = sid || "(missing)"

const out = document.getElementById("out")

/* -------------------------------------
PASTE YOUR SUPABASE URL HERE
------------------------------------- */

const base = "https://ubookoijqdmrxdlxldxf.supabase.co"

/* ------------------------------------- */

async function startHandshake(){

try{

out.textContent = "Calling create-challenge..."

const challengeResponse = await fetch(
base + "/functions/v1/create-challenge",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
sid:sid,
sig:sig
})
}
)

const challenge = await challengeResponse.json()

if(!challengeResponse.ok){
out.textContent = "create-challenge failed:\n" + JSON.stringify(challenge,null,2)
return
}

out.textContent = "Requesting passkey..."

const cred = await navigator.credentials.get({
publicKey: challenge.publicKey || challenge
})

const assertion = {
id:cred.id,
type:cred.type,
rawId:Array.from(new Uint8Array(cred.rawId)),
response:{
clientDataJSON:Array.from(new Uint8Array(cred.response.clientDataJSON)),
authenticatorData:Array.from(new Uint8Array(cred.response.authenticatorData)),
signature:Array.from(new Uint8Array(cred.response.signature))
}
}

out.textContent = "Calling verify-assertion..."

const verifyResponse = await fetch(
base + "/functions/v1/verify-assertion",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
sid:sid,
sig:sig,
assertion:assertion
})
}
)

const verify = await verifyResponse.json()

out.textContent = JSON.stringify(verify,null,2)

}catch(e){

out.textContent = "ERROR:\n" + e

}

}

document.getElementById("start").onclick = startHandshake

</script>

</body>
</html>
