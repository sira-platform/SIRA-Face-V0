<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SIRA Secure Handshake</title>
    <style>
      body { font-family: system-ui, Arial, sans-serif; margin: 32px; }
      .card { max-width: 720px; padding: 20px; border: 1px solid #ddd; border-radius: 12px; }
      button { padding: 10px 14px; font-size: 16px; cursor: pointer; }
      pre { background: #f6f6f6; padding: 12px; border-radius: 8px; overflow: auto; }
      .muted { color: #666; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>SIRA Secure Handshake</h1>

      <p class="muted">Session ID</p>
      <pre id="sidBox">(missing sid)</pre>

      <button id="go" disabled>Start passkey handshake</button>

      <h3>Output</h3>
      <pre id="out">(no action yet)</pre>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search)
      const sid = params.get("sid")
      const sig = params.get("sig")

      const sidBox = document.getElementById("sidBox")
      const out = document.getElementById("out")
      const go = document.getElementById("go")

      if (sid && sig) {
        sidBox.textContent = sid
        go.disabled = false
      } else {
        sidBox.textContent = "(missing sid)"
        out.textContent = "Open this page with ?sid=TEST&sig=TEST"
      }

      const base = "https://ubookoijqdmrxdlxldxf.supabase.co"

      function toB64Url(u8) {
        let s = ""
        u8.forEach(b => s += String.fromCharCode(b))
        return btoa(s).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "")
      }

      async function startPasskey() {
        try {
          out.textContent = "Creating challenge..."
          const chRes = await fetch(base + "/functions/v1/create-challenge", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ sid, sig })
          })
          const ch = await chRes.json()
          if (!chRes.ok) throw new Error("create-challenge failed: " + JSON.stringify(ch))

          out.textContent = "Requesting passkey..."
          const publicKey = ch.publicKey || ch
          const cred = await navigator.credentials.get({ publicKey })

          const assertion = {
            id: cred.id,
            type: cred.type,
            rawId: Array.from(new Uint8Array(cred.rawId)),
            response: {
              clientDataJSON: Array.from(new Uint8Array(cred.response.clientDataJSON)),
              authenticatorData: Array.from(new Uint8Array(cred.response.authenticatorData)),
              signature: Array.from(new Uint8Array(cred.response.signature)),
              userHandle: cred.response.userHandle ? Array.from(new Uint8Array(cred.response.userHandle)) : null
            }
          }

          out.textContent = "Verifying..."
          const vRes = await fetch(base + "/functions/v1/verify-assertion", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ sid, sig, assertion })
          })
          const result = await vRes.json()
          if (!vRes.ok) throw new Error("verify-assertion failed: " + JSON.stringify(result))

          out.textContent = JSON.stringify(result, null, 2)
        } catch (e) {
          out.textContent = String(e && e.message ? e.message : e)
        }
      }

      go.addEventListener("click", startPasskey)
    </script>
  </body>
</html>
