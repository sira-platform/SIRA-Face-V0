<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SIRA Secure Handshake</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 28px; }
    .card { max-width: 720px; border: 1px solid #ddd; border-radius: 12px; padding: 18px; }
    button { padding: 10px 14px; font-size: 16px; cursor: pointer; }
    pre { background: #f5f5f5; padding: 10px; border-radius: 8px; overflow: auto; }
    .row { margin: 10px 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>SIRA Secure Handshake</h1>

    <div class="row">Session ID</div>
    <pre id="sidBox">(missing)</pre>

    <button id="go" disabled>Start passkey handshake</button>

    <h3>Output</h3>
    <pre id="out">Ready</pre>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search)
    const sid = params.get("sid")
    const sig = params.get("sig")

    const sidBox = document.getElementById("sidBox")
    const out = document.getElementById("out")
    const go = document.getElementById("go")

    sidBox.textContent = sid || "(missing sid)"

    if (!sid || !sig) {
      out.textContent = "Open with ?sid=TEST&sig=TEST"
    } else {
      go.disabled = false
    }

    const SUPABASE_BASE = "https://ubookoijqdmrxdlxldxf.supabase.co"

    async function postJson(url, payload) {
      const res = await fetch(url, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(payload)
      })
      const text = await res.text()
      let data
      try { data = JSON.parse(text) } catch { data = { raw: text } }
      return { ok: res.ok, status: res.status, data }
    }

    function u8ToArr(buf) {
      return Array.from(new Uint8Array(buf))
    }

    async function start() {
      try {
        if (!sid || !sig) {
          out.textContent = "Missing sid or sig"
          return
        }

        out.textContent = "Calling create challenge..."
        const ch = await postJson(SUPABASE_BASE + "/functions/v1/create-challenge", { sid, sig })

        if (!ch.ok) {
          out.textContent = "create challenge failed. Status " + ch.status + "\n" + JSON.stringify(ch.data, null, 2)
          return
        }

        const publicKey = ch.data.publicKey || ch.data

        out.textContent = "Requesting passkey..."
        const cred = await navigator.credentials.get({ publicKey })

        const assertion = {
          id: cred.id,
          type: cred.type,
          rawId: u8ToArr(cred.rawId),
          response: {
            clientDataJSON: u8ToArr(cred.response.clientDataJSON),
            authenticatorData: u8ToArr(cred.response.authenticatorData),
            signature: u8ToArr(cred.response.signature),
            userHandle: cred.response.userHandle ? u8ToArr(cred.response.userHandle) : null
          }
        }

        out.textContent = "Calling confirm challenge..."
        const vr = await postJson(SUPABASE_BASE + "/functions/v1/confirm-challenge", { sid, sig, assertion })

        out.textContent = "confirm challenge. Status " + vr.status + "\n" + JSON.stringify(vr.data, null, 2)
      } catch (e) {
        out.textContent = "ERROR\n" + String(e && e.message ? e.message : e)
      }
    }

    go.addEventListener("click", start)
  </script>
</body>
</html>
